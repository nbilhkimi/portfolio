<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
   <title>Gallery | Nabil Nur Hakimi</title>
   
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
   <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">

   <style>
      :root {
          --primary-orange: #ff5e3a;
          --bg-dark: #050505;
          --glass: rgba(255, 255, 255, 0.03);
          --transition-speed: 0.6s;
          --ease: cubic-bezier(0.4, 0, 0.2, 1);
      }

      * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      
      body { 
          background-color: var(--bg-dark); 
          color: #fff; 
          font-family: 'Poppins', sans-serif;
          overflow: hidden;
          height: 100vh;
          height: -webkit-fill-available; /* Mobile height fix */
      }

      /* --- ENTRANCE --- */
      .entrance-swipe {
          position: fixed;
          top: 0; left: 0; width: 100%; height: 100%;
          background: var(--primary-orange);
          z-index: 9999;
          transform: translateX(0);
          animation: slideAway var(--transition-speed) var(--ease) forwards;
          pointer-events: none;
      }

      @keyframes slideAway {
          0% { transform: translateX(0); }
          100% { transform: translateX(-100%); }
      }

      .main-container {
          position: relative;
          height: 100vh;
          width: 100vw;
          display: flex;
          flex-direction: column;
          background: radial-gradient(circle at center, #111 0%, #000 100%);
      }

      .reveal { opacity: 0; animation: uiFadeIn 0.8s 0.5s var(--ease) forwards; }
      @keyframes uiFadeIn {
          from { opacity: 0; transform: translateY(10px); filter: blur(5px); }
          to { opacity: 1; transform: translateY(0); filter: blur(0); }
      }

      /* --- VIEWPORT --- */
      .viewport-section {
          flex-grow: 1;
          display: flex;
          align-items: center;
          justify-content: center;
          overflow: hidden;
          padding: 20px;
          touch-action: pan-y pinch-zoom; /* Allow native zoom, prevent browser navigation */
      }

      #main-display-img {
          max-width: 100%;
          max-height: 80%;
          object-fit: contain;
          transition: opacity 0.3s, transform 0.3s var(--ease);
          filter: drop-shadow(0 10px 30px rgba(0,0,0,0.8));
      }

      /* --- UI ELEMENTS --- */
      .ui-header {
          position: absolute; top: 0; left: 0; width: 100%;
          padding: 30px 40px;
          display: flex; justify-content: space-between; align-items: flex-start;
          z-index: 10;
          pointer-events: none;
      }
      .ui-header * { pointer-events: auto; }

      .ui-top-left h1 { font-family: 'Syncopate', sans-serif; font-size: 1rem; letter-spacing: 4px; color: var(--primary-orange); }
      .ui-top-left p { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.5; }

      .btn-back {
          text-decoration: none; color: #fff; font-size: 0.65rem; font-family: 'Syncopate', sans-serif;
          letter-spacing: 2px; padding: 10px 18px; background: var(--glass);
          border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px);
      }

      /* --- BOTTOM UI --- */
      .ui-footer {
          padding: 20px 40px 40px 40px;
          z-index: 10;
      }

      #img-title { 
          font-family: 'Syncopate', sans-serif; font-size: clamp(1rem, 4vw, 1.5rem); 
          border-left: 3px solid var(--primary-orange); padding-left: 20px; 
          text-transform: uppercase; margin-bottom: 25px;
      }

      .thumb-row {
          display: flex; gap: 10px; overflow-x: auto;
          scrollbar-width: none; /* Hide scrollbar Firefox */
          padding-bottom: 5px;
      }
      .thumb-row::-webkit-scrollbar { display: none; } /* Hide scrollbar Chrome/Safari */

      .thumb-item { 
          flex: 0 0 70px; height: 45px; cursor: pointer; 
          border: 1px solid rgba(255,255,255,0.1); overflow: hidden; 
          transition: 0.3s; background: #000;
      }
      .thumb-item img { width: 100%; height: 100%; object-fit: cover; opacity: 0.3; filter: grayscale(1); }
      .thumb-item.active { border-color: var(--primary-orange); }
      .thumb-item.active img { opacity: 1; filter: grayscale(0); }

      /* --- NAVIGATION --- */
      .nav-arrow { 
          position: absolute; top: 50%; transform: translateY(-50%); 
          color: rgba(255,255,255,0.2); font-size: 2rem; cursor: pointer; 
          z-index: 5; padding: 25px;
      }
      .arrow-left { left: 0; }
      .arrow-right { right: 0; }

      /* --- MOBILE OVERRIDES --- */
      @media (max-width: 768px) {
          .ui-header { padding: 20px; flex-direction: column; gap: 15px; }
          .ui-footer { padding: 20px; }
          .nav-arrow { display: none; } /* Swipe is better on mobile */
          .viewport-section { padding-top: 100px; }
          .thumb-item { flex: 0 0 60px; height: 40px; }
      }

      .delay-1 { animation-delay: 0.6s; }
      .delay-3 { animation-delay: 0.8s; }
   </style>
</head>
<body>

<div class="entrance-swipe"></div>

<div class="main-container">
   <div class="ui-header reveal delay-1">
      <div class="ui-top-left">
         <h1>ARCHIVE.LOG</h1>
         <p>Visual Intelligence</p>
      </div>
      <a href="index.html" class="btn-back">BACK</a>
   </div>

   <div class="nav-arrow arrow-left reveal" onclick="prevImg()"><i class="fas fa-angle-left"></i></div>
   <div class="nav-arrow arrow-right reveal" onclick="nextImg()"><i class="fas fa-angle-right"></i></div>

   <section class="viewport-section reveal" id="gallery-viewport">
      <img id="main-display-img" src="images/gallery1.png" alt="Gallery Image">
   </section>

   <div class="ui-footer reveal delay-3">
      <h2 id="img-title">INITIALIZING...</h2>
      <div class="thumb-row" id="thumb-container"></div>
   </div>
</div>

<script>
   const galleryData = [
      { src: 'images/gallery1.png', title: 'Familia' },
      { src: 'images/gallery2.jpg', title: 'X Dimension' },
      { src: 'images/gallery3.jpg', title: 'After Event' },
      { src: 'images/gallery4.jpg', title: 'Presentation' },
      { src: 'images/gallery8.jpg', title: 'Site Visit' },
      { src: 'images/gallery7.jpg', title: 'FSKTM Roots' },
      { src: 'images/gallery9.jpg', title: 'Esport days' },
      { src: 'images/jju.jpg', title: 'Dewan Sultan Ismail UTHM' }
   ];

   let currentIndex = 0;
   const mainImg = document.getElementById('main-display-img');
   const titleText = document.getElementById('img-title');
   const thumbContainer = document.getElementById('thumb-container');

   function initGallery() {
      galleryData.forEach((item, index) => {
          const div = document.createElement('div');
          div.className = `thumb-item ${index === 0 ? 'active' : ''}`;
          div.setAttribute('data-index', index);
          div.innerHTML = `<img src="${item.src}" alt="Thumb">`;
          div.onclick = () => updateMain(index);
          thumbContainer.appendChild(div);
      });
      updateMain(0);
   }

   function updateMain(index) {
      currentIndex = index;
      
      mainImg.style.opacity = "0";
      mainImg.style.transform = "scale(0.98)";
      
      setTimeout(() => {
          mainImg.src = galleryData[currentIndex].src;
          titleText.innerText = galleryData[currentIndex].title;
          mainImg.style.opacity = "1";
          mainImg.style.transform = "scale(1)";
          
          // Auto-scroll thumbnails on mobile
          const activeThumb = thumbContainer.children[index];
          activeThumb.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      }, 250);
      
      document.querySelectorAll('.thumb-item').forEach((t, i) => {
          t.classList.toggle('active', i === index);
      });
   }

   function nextImg() { currentIndex = (currentIndex + 1) % galleryData.length; updateMain(currentIndex); }
   function prevImg() { currentIndex = (currentIndex - 1 + galleryData.length) % galleryData.length; updateMain(currentIndex); }

   // Swipe Detection for Mobile
   let touchStartX = 0;
   let touchEndX = 0;
   
   const viewport = document.getElementById('gallery-viewport');
   viewport.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, false);
   viewport.addEventListener('touchend', e => {
       touchEndX = e.changedTouches[0].screenX;
       handleSwipe();
   }, false);

   function handleSwipe() {
       if (touchEndX < touchStartX - 50) nextImg();
       if (touchEndX > touchStartX + 50) prevImg();
   }

   // Keyboard Support
   document.addEventListener('keydown', (e) => {
      if(e.key === "ArrowRight") nextImg();
      if(e.key === "ArrowLeft") prevImg();
   });

   initGallery();
</script>

</body>
</html>
