<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
   
   <title>Nabil Nur Hakimi | Unity VR/AR Developer Portfolio</title>
   <meta name="description" content="Portfolio of Nabil Nur Hakimi, a Unity Developer specializing in immersive VR/AR systems and high-performance interactive applications.">
   <meta name="keywords" content="Nabil Nur Hakimi, Unity Developer, VR Developer, AR Developer, Portfolio, Malaysia, Game Developer">
   <meta name="author" content="Nabil Nur Hakimi">

   <meta property="og:title" content="Nabil Nur Hakimi | Unity VR/AR Developer">
   <meta property="og:description" content="Bridging the gap between creative design and technical execution in VR/AR.">
   <meta property="og:url" content="https://nbilhkimi.github.io/portfolio/">
   <meta property="og:type" content="website">

   <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Poppins:wght@300;600;900&display=swap" rel="stylesheet">
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
   
   <style>
      :root {
          --primary-orange: #ff5e3a; 
          --neon-glow: rgba(255, 94, 58, 0.6);
          --bg-dark: #0a0a0a;
          --card-bg: rgba(20, 20, 20, 0.85);
          --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      }

      * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      
      body { 
          background-color: var(--bg-dark); 
          color: #fff;
          font-family: 'Poppins', sans-serif;
          overflow-x: hidden;
          min-height: 100vh;
          /* Fix for mobile address bar height */
          min-height: -webkit-fill-available;
      }

      html { height: -webkit-fill-available; }

      #canvas-bg {
          position: fixed;
          top: 0; left: 0; width: 100%; height: 100%;
          z-index: -1;
          background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
          pointer-events: none; /* Prevents canvas from stealing touch events */
      }

      .transition-swipe {
          position: fixed;
          top: 0; left: 100%;
          width: 100%; height: 100%;
          background: var(--primary-orange);
          z-index: 9999;
          transition: left 0.5s cubic-bezier(0.77, 0, 0.175, 1);
          pointer-events: none;
      }

      /* --- HEADER & BIO --- */
      .header-wrapper {
          padding: 80px 8% 40px 8%;
          position: relative;
          animation: fadeInUp 1s ease forwards;
      }

      .header-container {
          display: grid;
          grid-template-columns: 1.2fr 0.8fr; 
          gap: 30px;
          max-width: 1400px;
          margin: 0 auto;
          align-items: end;
      }

      .title-side h1 {
          font-size: clamp(2.5rem, 12vw, 6.5rem);
          font-weight: 900;
          line-height: 0.9;
          text-transform: uppercase;
          letter-spacing: -1px;
          font-family: 'Syncopate', sans-serif;
          background: linear-gradient(to bottom, #fff 100%, #444 100%);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
      }

      .description-side p {
          font-size: 0.95rem; 
          color: #aaa; 
          border-left: 2px solid var(--primary-orange); 
          padding: 15px 20px; 
          max-width: 450px;
          line-height: 1.6;
      }

      /* --- BUTTONS --- */
      .btn-container { display: flex; gap: 12px; margin-top: 25px; flex-wrap: wrap; }

      .resume-btn, .contact-btn, #submitText {
          display: inline-flex;
          padding: 14px 28px; /* Slightly larger for better touch targets */
          border: 1px solid var(--primary-orange);
          color: var(--primary-orange);
          text-decoration: none;
          font-family: 'Syncopate', sans-serif;
          font-size: 0.7rem;
          font-weight: 700;
          letter-spacing: 2px;
          text-transform: uppercase;
          transition: var(--transition);
          cursor: pointer;
          background: transparent;
          white-space: nowrap;
      }

      .contact-btn { background: var(--primary-orange); color: #000; }

      /* --- SERVICE CARDS --- */
      .services-grid {
          display: flex; width: 100%; height: 50vh; min-height: 400px; padding: 20px 8%; gap: 12px;
          animation: fadeInUp 1s ease forwards; animation-delay: 0.3s; opacity: 0;
          margin-bottom: 50px;
      }

      .service-card {
          position: relative; flex: 1; overflow: hidden; display: flex; align-items: flex-end;
          padding: 30px; text-decoration: none; transition: var(--transition);
          border-radius: 4px; border: 1px solid rgba(255,255,255,0.05); background: var(--card-bg);
          color: #ffffff !important;
      }

      .service-card::before {
          content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
          background-size: cover; background-position: center; transition: var(--transition);
          z-index: 1; opacity: 0.3; filter: grayscale(1);
      }

      .card-1::before { background-image: url('images/dp.jpg'); }
      .card-2::before { background-image: url('images/meta.png'); }
      .card-3::before { background-image: url('images/book3.png'); }
      .card-4::before { background-image: url('images/gallery.jpg'); }

      .card-content { position: relative; z-index: 4; }
      .card-content h3 { font-family: 'Syncopate', sans-serif; text-transform: uppercase; font-size: 1.1rem; letter-spacing: 2px; }

      /* --- MODAL --- */
      .modal-overlay {
          position: fixed;
          top: 0; left: 0; width: 100%; height: 100%;
          background: rgba(0,0,0,0.95);
          display: none;
          justify-content: center;
          align-items: center;
          z-index: 10000;
          backdrop-filter: blur(10px);
          padding: 20px;
      }

      .modal-box {
          background: var(--card-bg); padding: 30px; width: 100%; max-width: 450px;
          border: 1px solid var(--primary-orange); position: relative;
      }

      @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

      /* --- MOBILE OPTIMIZATIONS --- */
      @media (hover: hover) {
          .service-card:hover { flex: 2; border-color: var(--primary-orange); }
          .service-card:hover::before { opacity: 0.8; filter: grayscale(0); transform: scale(1.05); }
          .resume-btn:hover { background: rgba(255, 94, 58, 0.1); box-shadow: 0 0 15px var(--neon-glow); transform: translateY(-3px); }
          .contact-btn:hover { box-shadow: 0 0 20px var(--neon-glow); filter: brightness(1.1); transform: translateY(-3px); }
      }

      @media (max-width: 900px) {
          .header-wrapper { padding-top: 60px; }
          .header-container { grid-template-columns: 1fr; gap: 20px; }
          .services-grid { flex-direction: column; height: auto; padding-bottom: 60px; }
          .service-card { height: 160px; flex: none; opacity: 1 !important; }
          .service-card::before { opacity: 0.5; filter: grayscale(0.5); }
          .description-side p { font-size: 0.9rem; padding: 10px 15px; }
          .btn-container { width: 100%; }
          .resume-btn, .contact-btn { flex: 1; justify-content: center; }
      }
   </style>
</head>
<body>

<canvas id="canvas-bg"></canvas>
<div class="transition-swipe"></div>

<iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(typeof submitted !== 'undefined' && submitted) {showSuccess();}"></iframe>

<div class="modal-overlay" id="contactModal">
    <div class="modal-box">
        <span onclick="document.getElementById('contactModal').style.display='none'" style="position:absolute; top:15px; right:15px; cursor:pointer; font-size:1.8rem; padding: 10px;">×</span>
        <h2 style="font-family:'Syncopate'; color:var(--primary-orange); font-size:0.9rem; margin-bottom:20px;">NEW TRANSMISSION</h2>
        <form action="https://docs.google.com/forms/d/e/1FAIpQLSdnp1brNHNwv1ruz1cHDXvFn6e31TFCN1OfbE9xOSplXuRLhw/formResponse" 
              method="POST" target="hidden_iframe" onsubmit="submitted=true;">
            
            <input type="email" name="entry.518894902" placeholder="YOUR EMAIL" style="width:100%; padding:15px; margin-bottom:10px; background:#111; border:1px solid #333; color:#fff; font-size: 16px;" required>
            <textarea name="entry.2140952399" rows="5" placeholder="MESSAGE..." style="width:100%; padding:15px; margin-bottom:10px; background:#111; border:1px solid #333; color:#fff; font-size: 16px;" required></textarea>
            
            <button type="submit" id="submitText" style="width:100%;">SEND</button>
        </form>
    </div>
</div>

<div class="header-wrapper">
   <section class="header-container">
      <div class="title-side">
         <span style="color:var(--primary-orange); font-family:'Syncopate'; font-size:0.6rem; letter-spacing:4px; margin-bottom:10px; display:block;">NAB-DEV // 2024</span>
         <h1>Nabil<br>NurHakimi</h1>
         <div class="btn-container">
             <a href="files/resume.pdf" download class="resume-btn">Resume</a>
             <button class="contact-btn" onclick="document.getElementById('contactModal').style.display='flex'">Contact</button>
         </div>
      </div>
      <div class="description-side">
         <p>Ambitious Unity Developer specializing in immersive VR/AR systems. Bridging the gap between creative design and technical execution to build intuitive, high-performance applications.</p>
      </div>
   </section>
</div>

<section class="services-grid">
   <a href="profile.html" class="service-card card-1 transition-link"><div class="card-content"><h3>Profile</h3></div></a>
   <a href="project.html" class="service-card card-2 transition-link"><div class="card-content"><h3>Projects</h3></div></a>
   <a href="award.html" class="service-card card-3 transition-link"><div class="card-content"><h3>Awards</h3></div></a>
   <a href="gallery.html" class="service-card card-4 transition-link"><div class="card-content"><h3>Gallery</h3></div></a>
</section>

<script>
   let submitted = false;

   function showSuccess() {
      const btn = document.getElementById('submitText');
      btn.innerText = "SUCCESS";
      btn.style.color = "#00ff88";
      btn.style.borderColor = "#00ff88";
      setTimeout(() => {
         document.getElementById('contactModal').style.display = 'none';
         btn.innerText = "SEND";
         btn.style.color = "var(--primary-orange)";
         btn.style.borderColor = "var(--primary-orange)";
         document.querySelector('form').reset();
         submitted = false;
      }, 2000);
   }

   // PERFORMANCE OPTIMIZED CANVAS
   const canvas = document.getElementById('canvas-bg');
   const ctx = canvas.getContext('2d');
   let particles = [];
   const particleCount = window.innerWidth < 900 ? 35 : 70; // Reduce particles on mobile

   function initCanvas() { 
       canvas.width = window.innerWidth; 
       canvas.height = window.innerHeight; 
   }

   class Particle {
      constructor() {
         this.reset();
      }
      reset() {
         this.x = Math.random() * canvas.width;
         this.y = Math.random() * canvas.height;
         this.size = Math.random() * 1.5 + 1;
         this.speedX = Math.random() * 0.3 - 0.15;
         this.speedY = Math.random() * 0.3 - 0.15;
      }
      update() {
         this.x += this.speedX; this.y += this.speedY;
         if (this.x > canvas.width || this.x < 0) this.speedX *= -1;
         if (this.y > canvas.height || this.y < 0) this.speedY *= -1;
      }
      draw() {
         ctx.fillStyle = 'rgba(255, 94, 58, 0.4)';
         ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
      }
   }

   function createParticles() {
      particles = [];
      for (let i = 0; i < particleCount; i++) { particles.push(new Particle()); }
   }

   function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const distLimit = window.innerWidth < 900 ? 80 : 120; // Shorter lines on mobile

      particles.forEach((p, index) => {
         p.update(); p.draw();
         for (let j = index + 1; j < particles.length; j++) {
            const dx = p.x - particles[j].x; const dy = p.y - particles[j].y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            if (distance < distLimit) {
               ctx.strokeStyle = `rgba(255, 94, 58, ${0.25 - distance/distLimit})`;
               ctx.lineWidth = 0.5; ctx.beginPath(); ctx.moveTo(p.x, p.y);
               ctx.lineTo(particles[j].x, particles[j].y); ctx.stroke();
            }
         }
      });
      requestAnimationFrame(animate);
   }

   window.addEventListener('resize', () => { 
       initCanvas(); 
       if (particles.length === 0) createParticles(); 
   });
   
   initCanvas(); createParticles(); animate();

   // TRANSITIONS
   document.querySelectorAll('.transition-link').forEach(link => {
      link.addEventListener('click', function(e) {
         e.preventDefault();
         const target = this.getAttribute('href');
         document.querySelector('.transition-swipe').style.left = '0';
         setTimeout(() => { window.location.href = target; }, 500);
      });
   });
</script>

</body>
</html>
